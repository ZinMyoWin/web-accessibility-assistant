<svg xmlns="http://www.w3.org/2000/svg" width="640" height="160" viewBox="0 0 640 160" role="img" aria-labelledby="title desc">
  <title id="title">AccessLens logo</title>
  <desc id="desc">A teal accessibility logo combining a magnifying lens, focus ring, and check mark next to the AccessLens wordmark.</desc>
  <defs>
    <linearGradient id="lensGradient" x1="24" y1="20" x2="132" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D9E75"/>
      <stop offset="1" stop-color="#0F6E56"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#2C2C2A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="640" height="160" rx="28" fill="#F5F5F3"/>

  <g filter="url(#softShadow)">
    <rect x="32" y="24" width="112" height="112" rx="28" fill="#FFFFFF"/>
    <circle cx="82" cy="74" r="35" fill="#E1F5EE" stroke="url(#lensGradient)" stroke-width="10"/>
    <path d="M108 101L129 122" stroke="#0F6E56" stroke-width="12" stroke-linecap="round"/>
    <path d="M66 75L77 86L101 60" fill="none" stroke="#1D9E75" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M82 47V37M82 111V101M55 74H45M119 74H109" stroke="#0F6E56" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  </g>

  <g fill="#2C2C2A">
    <text x="176" y="84" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" letter-spacing="0">Access<tspan fill="#1D9E75">Lens</tspan></text>
    <text x="178" y="113" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="1.6" fill="#5C5B56">WEB ACCESSIBILITY ASSISTANT</text>
  </g>
</svg>
