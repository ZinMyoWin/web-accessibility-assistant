services:
  db:
    image: postgres:16
    container_name: web-accessibility-db
    environment:
      POSTGRES_DB: accessibility_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accessibility_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: web-accessibility-backend-dev
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/accessibility_assistant
      SCAN_EXECUTION_MODE: worker
      AUTH_JWT_SECRET: "XAiBKqnAY5Uk4qY+4YDmYB7winu1i6Uqom1+Uu3bcl/8IUCiuD+YGENH6OFgEpwlc4X19zi2to+HNJ9HmuAdDA=="
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  scan-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: web-accessibility-scan-worker-dev
    command: ["python", "-m", "app.scan_worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/accessibility_assistant
      SCAN_WORKER_POLL_INTERVAL_SECONDS: "2"
      SCAN_WORKER_STALE_AFTER_SECONDS: "300"
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: web-accessibility-frontend-dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      scan-worker:
        condition: service_started

volumes:
  postgres_data:
